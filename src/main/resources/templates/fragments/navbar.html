<!-- Navigation Bar Fragment -->
<nav th:fragment="navbar(activePage)" class="navbar-modern" id="navbar">
    <style>
        .navbar-modern {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .navbar-brand-modern {
            font-size: 1.4rem;
            font-weight: 800;
            color: #7c3aed;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.3s ease;
        }

        .navbar-brand-modern:hover {
            color: #6d28d9;
        }

        .brand-icon {
            font-size: 1.8rem;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            gap: 0.5rem;
            margin: 0;
            padding: 0;
            flex: 1;
        }

        .nav-item-modern {
            margin: 0;
        }

        .nav-link-modern {
            color: #334155;
            text-decoration: none;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .nav-link-modern i {
            font-size: 1rem;
        }

        .nav-link-modern:hover {
            background: rgba(124, 58, 237, 0.1);
            color: #7c3aed;
        }

        .nav-link-modern.active {
            background: rgba(124, 58, 237, 0.15);
            color: #7c3aed;
            font-weight: 600;
        }

        .user-profile {
            margin-left: auto;
        }

        .user-profile-link {
            text-decoration: none;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .user-profile-link:hover {
            background: #f1f5f9;
        }

        .profile-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .user-info {
            text-align: left;
        }

        .user-name {
            font-weight: 600;
            color: #0f172a;
            font-size: 0.9rem;
        }

        .user-role {
            font-size: 0.8rem;
            color: #64748b;
        }

        .profile-dropdown {
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 0.75rem 0;
            min-width: 180px;
        }

        .profile-dropdown .dropdown-item {
            padding: 0.75rem 1.25rem;
            color: #334155;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .profile-dropdown .dropdown-item:hover {
            background: #f1f5f9;
            color: #7c3aed;
        }

        .profile-dropdown .dropdown-divider {
            margin: 0.5rem 0;
            border-color: #e2e8f0;
        }

        @media (max-width: 768px) {
            .navbar-container {
                padding: 0 1rem;
                gap: 1rem;
            }

            .nav-menu {
                gap: 0.25rem;
            }

            .nav-link-modern {
                padding: 0.5rem 0.75rem;
                font-size: 0.85rem;
            }

            .navbar-brand-modern {
                font-size: 1.1rem;
            }
        }
    </style>

    <div class="navbar-container">
        <a class="navbar-brand-modern" href="/dashboard" th:href="@{/dashboard}">
            <div class="brand-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            EduHub
        </a>

        <ul class="nav-menu">
            <li class="nav-item-modern">
                <a class="nav-link-modern" th:href="@{/dashboard}" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
                    <i class="fas fa-home"></i>Dashboard
                </a>
            </li>
            <li class="nav-item-modern">
                <a class="nav-link-modern" th:href="@{/schedules}" th:classappend="${activePage == 'schedules'} ? 'active' : ''">
                    <i class="fas fa-calendar"></i>Schedules
                </a>
            </li>
            <li class="nav-item-modern">
                <a class="nav-link-modern" th:href="@{/materials}" th:classappend="${activePage == 'materials'} ? 'active' : ''">
                    <i class="fas fa-book"></i>Materials
                </a>
            </li>
            <li class="nav-item-modern">
                <a class="nav-link-modern" th:href="@{/exams}" th:classappend="${activePage == 'exams'} ? 'active' : ''">
                    <i class="fas fa-file-alt"></i>Exams
                </a>
            </li>
            <li class="nav-item-modern">
                <a class="nav-link-modern" th:href="@{/announcements}" th:classappend="${activePage == 'announcements'} ? 'active' : ''">
                    <i class="fas fa-bell"></i>Announcements
                </a>
            </li>
        </ul>

        <div class="user-profile dropdown">
            <a href="#" class="user-profile-link dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                <div class="profile-avatar">
                    <span th:text="${user != null ? user.fullName.substring(0,1).toUpperCase() + (user.fullName.indexOf(' ') > 0 ? user.fullName.substring(user.fullName.indexOf(' ')+1, user.fullName.indexOf(' ')+2).toUpperCase() : '') : 'JD'}">JD</span>
                </div>
                <div class="user-info">
                    <div class="user-name" th:text="${user != null ? user.fullName : 'User'}">User</div>
                    <div class="user-role" th:text="${user != null ? user.email : 'student@edu.com'}">student</div>
                </div>
                <i class="fas fa-chevron-down ms-2"></i>
            </a>

            <!-- Profile Dropdown Menu -->
            <ul class="dropdown-menu dropdown-menu-end profile-dropdown">
                <li>
                    <a class="dropdown-item" th:href="@{/profile}">
                        <i class="fas fa-user me-2"></i>Profile
                    </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <a class="dropdown-item text-danger" th:href="@{/logout}">
                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
