<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments - EduHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fa; color: #333; }

        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            box-shadow: 0 2px 15px rgba(102,126,234,0.3);
            padding: 1rem 0;
        }
        .navbar-brand { font-size: 1.5rem; font-weight: 700; }
        .navbar-nav .nav-link {
            margin: 0 5px; padding: 0.5rem 1rem !important;
            border-radius: 5px; transition: all 0.3s ease; font-size: 0.95rem;
        }
        .navbar-nav .nav-link:hover { background: rgba(255,255,255,0.2); }
        .navbar-nav .nav-link.active { background: rgba(255,255,255,0.3); font-weight: 600; }

        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 40px 0; margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(102,126,234,0.2);
        }
        .page-header h1 { font-size: 32px; font-weight: 700; margin-bottom: 10px; }
        .page-header p { font-size: 16px; opacity: 0.9; }

        .upload-card {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            padding: 30px; margin-bottom: 35px;
        }
        .upload-card h5 { font-weight: 700; color: #333; margin-bottom: 25px; font-size: 18px; }

        .form-label { font-weight: 600; color: #555; font-size: 14px; }
        .form-control, .form-select {
            border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 10px 14px;
            font-size: 14px; transition: all 0.3s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }

        .file-drop-zone {
            border: 2.5px dashed #c5c9e8; border-radius: 10px;
            padding: 40px 20px; text-align: center; cursor: pointer;
            transition: all 0.3s; background: #fafbff;
        }
        .file-drop-zone:hover, .file-drop-zone.dragover {
            border-color: #667eea; background: #f0f2ff;
        }
        .file-drop-zone i { font-size: 40px; color: #667eea; margin-bottom: 12px; display: block; }
        .file-drop-zone p { color: #888; font-size: 14px; margin: 0; }
        .file-drop-zone .browse-btn {
            color: #667eea; font-weight: 600; cursor: pointer; text-decoration: underline;
        }
        #filePreview {
            margin-top: 12px; padding: 10px 15px; background: #e8f5e9;
            border-radius: 8px; display: none; align-items: center; gap: 10px;
            font-size: 14px; color: #388e3c; font-weight: 600;
        }

        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 12px 30px;
            border-radius: 8px; width: 100%; font-size: 15px;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn-upload:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* History Section */
        .history-card {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            padding: 30px;
        }
        .history-card h5 { font-weight: 700; color: #333; margin-bottom: 25px; font-size: 18px; }

        .slip-item {
            border: 1.5px solid #eee; border-radius: 10px; padding: 18px;
            margin-bottom: 15px; transition: all 0.3s; position: relative;
        }
        .slip-item:hover { border-color: #667eea; box-shadow: 0 3px 12px rgba(102,126,234,0.1); }

        .slip-subject {
            font-weight: 700; font-size: 15px; color: #333; margin-bottom: 5px;
        }
        .slip-meta { font-size: 13px; color: #888; display: flex; gap: 20px; flex-wrap: wrap; }
        .slip-meta span { display: flex; align-items: center; gap: 5px; }

        .badge-pending {
            background: #fff3e0; color: #f57c00;
            border: 1px solid #ffcc80; padding: 5px 14px;
            border-radius: 20px; font-size: 12px; font-weight: 700;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .badge-approved {
            background: #e8f5e9; color: #2e7d32;
            border: 1px solid #a5d6a7; padding: 5px 14px;
            border-radius: 20px; font-size: 12px; font-weight: 700;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .badge-rejected {
            background: #fce4ec; color: #c62828;
            border: 1px solid #ef9a9a; padding: 5px 14px;
            border-radius: 20px; font-size: 12px; font-weight: 700;
            display: inline-flex; align-items: center; gap: 5px;
        }

        /* Progress tracker */
        .progress-tracker {
            display: flex; align-items: center; gap: 0;
            margin-top: 14px;
        }
        .tracker-step {
            display: flex; flex-direction: column; align-items: center;
            flex: 1; position: relative;
        }
        .tracker-step .step-icon {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; z-index: 1;
            border: 2px solid #ddd; background: white; color: #bbb;
        }
        .tracker-step.done .step-icon {
            background: #667eea; border-color: #667eea; color: white;
        }
        .tracker-step.approved .step-icon {
            background: #2e7d32; border-color: #2e7d32; color: white;
        }
        .tracker-step.rejected .step-icon {
            background: #c62828; border-color: #c62828; color: white;
        }
        .tracker-step .step-label {
            font-size: 11px; font-weight: 600; margin-top: 5px;
            color: #bbb; text-align: center;
        }
        .tracker-step.done .step-label { color: #667eea; }
        .tracker-step.approved .step-label { color: #2e7d32; }
        .tracker-step.rejected .step-label { color: #c62828; }
        .tracker-line {
            height: 3px; flex: 1; background: #ddd; margin-bottom: 18px;
        }
        .tracker-line.done { background: #667eea; }
        .tracker-line.approved { background: #2e7d32; }

        .review-note-box {
            margin-top: 10px; padding: 10px 14px;
            background: #f9f9f9; border-radius: 8px;
            font-size: 13px; color: #555; border-left: 3px solid #667eea;
        }

        .subject-filter-tabs {
            display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .filter-chip {
            padding: 7px 18px; border: 2px solid #ddd; border-radius: 20px;
            cursor: pointer; font-size: 13px; font-weight: 600; background: white;
            transition: all 0.3s;
        }
        .filter-chip:hover { border-color: #667eea; color: #667eea; }
        .filter-chip.active { background: #667eea; border-color: #667eea; color: white; }

        .empty-state {
            text-align: center; padding: 50px 20px; color: #bbb;
        }
        .empty-state i { font-size: 50px; margin-bottom: 15px; display: block; }

        #uploadAlert { display: none; }

        @media (max-width: 768px) {
            .slip-meta { gap: 10px; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <th:block th:replace="~{fragments/navbar :: navbar(activePage='payments')}"></th:block>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <h1><i class="fas fa-credit-card me-2"></i>Payment Slips</h1>
            <p>Upload your monthly payment slips for each subject and track approval status</p>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row g-4">
            <!-- Left: Upload Form -->
            <div class="col-lg-5">
                <div class="upload-card">
                    <h5><i class="fas fa-upload me-2" style="color:#667eea;"></i>Upload Payment Slip</h5>

                    <div id="uploadAlert" class="alert mb-3" role="alert"></div>

                    <form id="uploadForm" novalidate>
                        <!-- Subject -->
                        <div class="mb-3">
                            <label for="subject" class="form-label">Select Subject *</label>
                            <select id="subject" class="form-select" required>
                                <option value="">-- Choose Subject --</option>
                                <option value="combine-maths">📐 Combine Mathematics</option>
                                <option value="chemistry">🧪 Chemistry</option>
                                <option value="physics">⚛️ Physics</option>
                            </select>
                        </div>

                        <!-- Payment Month -->
                        <div class="mb-3">
                            <label for="paymentMonth" class="form-label">Payment For Month *</label>
                            <input type="month" id="paymentMonth" class="form-control" required>
                        </div>

                        <!-- File Upload -->
                        <div class="mb-3">
                            <label class="form-label">Payment Slip (JPG, PNG, or PDF) *</label>
                            <div class="file-drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <p>Drag & drop your file here or <span class="browse-btn">browse</span></p>
                                <p style="margin-top: 6px; font-size: 12px;">Supported: JPG, PNG, PDF (max 5MB)</p>
                            </div>
                            <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.pdf" style="display:none;">
                            <div id="filePreview">
                                <i class="fas fa-file-check"></i>
                                <span id="filePreviewName"></span>
                                <span id="clearFile" onclick="clearFile()" style="margin-left: auto; cursor:pointer; color:#c62828;">
                                    <i class="fas fa-times"></i>
                                </span>
                            </div>
                        </div>

                        <!-- Note -->
                        <div class="mb-4">
                            <label for="note" class="form-label">Note (Optional)</label>
                            <textarea id="note" class="form-control" rows="3"
                                placeholder="e.g. Payment for February via Bank Transfer..."></textarea>
                        </div>

                        <button type="submit" class="btn-upload" id="submitBtn">
                            <i class="fas fa-paper-plane me-2"></i>Submit Payment Slip
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right: My Payment History -->
            <div class="col-lg-7">
                <div class="history-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0"><i class="fas fa-history me-2" style="color:#667eea;"></i>My Payment History</h5>
                        <button class="btn btn-sm btn-outline-primary" onclick="loadPayments()">
                            <i class="fas fa-sync-alt me-1"></i>Refresh
                        </button>
                    </div>

                    <!-- Filter Chips -->
                    <div class="subject-filter-tabs">
                        <span class="filter-chip active" onclick="filterBySubject('all', this)">All</span>
                        <span class="filter-chip" onclick="filterBySubject('Combine Mathematics', this)">📐 Maths</span>
                        <span class="filter-chip" onclick="filterBySubject('Chemistry', this)">🧪 Chemistry</span>
                        <span class="filter-chip" onclick="filterBySubject('Physics', this)">⚛️ Physics</span>
                    </div>

                    <div id="paymentsList">
                        <div class="empty-state">
                            <i class="fas fa-spinner fa-spin" style="color:#667eea;"></i>
                            <p>Loading your payments...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allPayments = [];
        let currentFilter = 'all';

        // ---- File Upload Handling ----
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (!file) return;
            const allowed = ['image/jpeg', 'image/png', 'application/pdf'];
            if (!allowed.includes(file.type)) {
                showAlert('danger', 'Only JPG, PNG, or PDF files are allowed.');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showAlert('danger', 'File size must be less than 5MB.');
                return;
            }
            document.getElementById('filePreviewName').textContent = file.name;
            document.getElementById('filePreview').style.display = 'flex';
        }

        function clearFile() {
            fileInput.value = '';
            document.getElementById('filePreview').style.display = 'none';
        }

        // ---- Form Submit ----
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const subject = document.getElementById('subject').value;
            const paymentMonth = document.getElementById('paymentMonth').value;
            const note = document.getElementById('note').value;
            const file = fileInput.files[0];

            if (!subject) { showAlert('danger', 'Please select a subject.'); return; }
            if (!paymentMonth) { showAlert('danger', 'Please enter the payment month.'); return; }
            if (!file) { showAlert('danger', 'Please select a file to upload.'); return; }

            const formData = new FormData();
            formData.append('subject', subject);
            formData.append('paymentMonth', paymentMonth);
            formData.append('note', note);
            formData.append('file', file);

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Uploading...';

            try {
                const res = await fetch('/api/payments/upload', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.success) {
                    showAlert('success', '✅ ' + data.message);
                    document.getElementById('uploadForm').reset();
                    clearFile();
                    loadPayments();
                } else {
                    showAlert('danger', '❌ ' + data.message);
                }
            } catch {
                showAlert('danger', 'Upload failed. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Submit Payment Slip';
            }
        });

        // ---- Load Payment History ----
        async function loadPayments() {
            try {
                const res = await fetch('/api/payments/my');
                if (!res.ok) { document.getElementById('paymentsList').innerHTML = '<p class="text-danger">Could not load payments.</p>'; return; }
                allPayments = await res.json();
                renderPayments();
            } catch {
                document.getElementById('paymentsList').innerHTML = '<p class="text-danger">Error loading payments.</p>';
            }
        }

        function filterBySubject(subject, el) {
            currentFilter = subject;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderPayments();
        }

        function renderPayments() {
            const list = currentFilter === 'all'
                ? allPayments
                : allPayments.filter(p => p.subjectName === currentFilter);

            if (list.length === 0) {
                document.getElementById('paymentsList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-receipt"></i>
                        <p>No payment slips found.</p>
                    </div>`;
                return;
            }

            let html = '';
            list.forEach(slip => {
                const statusBadge = getStatusBadge(slip.status);
                const reviewNoteHtml = slip.reviewNote
                    ? `<div class="review-note-box"><i class="fas fa-comment me-1"></i> Admin note: ${slip.reviewNote}</div>` : '';
                const tracker = buildTracker(slip.status);
                const uploadDate = new Date(slip.uploadedAt).toLocaleDateString('en-US', {
                    year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                html += `
                <div class="slip-item">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <div class="slip-subject">${getSubjectIcon(slip.subjectName)} ${slip.subjectName}</div>
                            <div class="slip-meta">
                                <span><i class="fas fa-calendar"></i>${formatMonth(slip.paymentMonth)}</span>
                                <span><i class="fas fa-file"></i>${slip.fileName}</span>
                                <span><i class="fas fa-clock"></i>${uploadDate}</span>
                            </div>
                        </div>
                        <div>${statusBadge}</div>
                    </div>
                    ${slip.note ? `<div style="font-size:13px; color:#666; margin-bottom:8px;"><i class="fas fa-sticky-note me-1"></i>${slip.note}</div>` : ''}
                    ${tracker}
                    ${reviewNoteHtml}
                </div>`;
            });

            document.getElementById('paymentsList').innerHTML = html;
        }

        function getStatusBadge(status) {
            if (status === 'PENDING') return `<span class="badge-pending"><i class="fas fa-clock"></i>Pending</span>`;
            if (status === 'APPROVED') return `<span class="badge-approved"><i class="fas fa-check-circle"></i>Approved</span>`;
            if (status === 'REJECTED') return `<span class="badge-rejected"><i class="fas fa-times-circle"></i>Rejected</span>`;
            return '';
        }

        function buildTracker(status) {
            const uploaded = 'done';
            const reviewing = status !== 'PENDING' ? 'done' : '';
            const finalClass = status === 'APPROVED' ? 'approved' : status === 'REJECTED' ? 'rejected' : '';
            const finalIcon = status === 'APPROVED' ? 'fa-check' : status === 'REJECTED' ? 'fa-times' : 'fa-hourglass';
            const finalLabel = status === 'APPROVED' ? 'Approved' : status === 'REJECTED' ? 'Rejected' : 'Awaiting';
            const line1 = reviewing ? 'done' : '';
            const line2 = finalClass || '';

            return `
            <div class="progress-tracker">
                <div class="tracker-step done">
                    <div class="step-icon"><i class="fas fa-upload"></i></div>
                    <div class="step-label">Uploaded</div>
                </div>
                <div class="tracker-line ${line1}"></div>
                <div class="tracker-step ${reviewing}">
                    <div class="step-icon"><i class="fas fa-search"></i></div>
                    <div class="step-label">Under Review</div>
                </div>
                <div class="tracker-line ${line2}"></div>
                <div class="tracker-step ${finalClass}">
                    <div class="step-icon"><i class="fas ${finalIcon}"></i></div>
                    <div class="step-label">${finalLabel}</div>
                </div>
            </div>`;
        }

        function getSubjectIcon(name) {
            if (name === 'Combine Mathematics') return '📐';
            if (name === 'Chemistry') return '🧪';
            if (name === 'Physics') return '⚛️';
            return '📚';
        }

        function formatMonth(monthStr) {
            if (!monthStr) return '';
            const [year, month] = monthStr.split('-');
            if (!month) return monthStr;
            const d = new Date(parseInt(year), parseInt(month) - 1);
            return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
        }

        function showAlert(type, msg) {
            const el = document.getElementById('uploadAlert');
            el.className = `alert alert-${type}`;
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 6000);
        }

        // Load on start
        document.addEventListener('DOMContentLoaded', loadPayments);
    </script>
</body>
</html>
